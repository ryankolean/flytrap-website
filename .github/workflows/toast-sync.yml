name: Toast sync

# Single scheduled bot that pulls EVERYTHING the site shows from Toast (the
# source of truth) and commits the result to main so Pages redeploys:
#   - assets/menu.json        the full standing menu       (toast-sync.mjs)
#   - data.js SPECIALS block   weekly specials + photos     (specials-sync.mjs)
#   - data.js EXTRAS block      soup + mini-muffin           (specials-sync.mjs)
#
# Both pulls run in ONE job and produce ONE commit, so the two syncs can never
# race each other on push — the reason this replaced the old split
# specials-sync + toast-menu-sync workflows. A `git pull --rebase` before push
# also absorbs any human commit that landed on main mid-run.
#
# Every 15 minutes it checks Toast; if nothing changed it commits nothing and
# skips. No-op until the TOAST_* secrets are set, so it is safe to merge before
# credentials are installed. Each script writes nothing on any Toast/network
# error, so the last-good committed menu/specials stay live — a Toast outage
# never blanks the site. The Toast credential needs the `menus:read` scope.
#
# Required repo secrets: TOAST_CLIENT_ID, TOAST_CLIENT_SECRET, TOAST_RESTAURANT_GUID
# Optional: TOAST_HOSTNAME, TOAST_VEG_MARKER, TOAST_SPECIALS_GROUP, TOAST_EXCLUDE_GROUPS

on:
  schedule:
    # Every 15 minutes. Most runs are a no-op (nothing committed unless Toast
    # actually changed). GitHub's scheduler is best-effort and can lag a few
    # minutes under load.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Verify only — pull from Toast and log, write/commit nothing'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: toast-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
      TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
      TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
      TOAST_HOSTNAME: ${{ secrets.TOAST_HOSTNAME }}
      TOAST_VEG_MARKER: ${{ secrets.TOAST_VEG_MARKER }}
      TOAST_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull full menu from Toast
        env:
          TOAST_EXCLUDE_GROUPS: ${{ secrets.TOAST_EXCLUDE_GROUPS }}
          # Save the pulled /menus payload so the specials step can reuse it.
          TOAST_PAYLOAD_OUT: ${{ runner.temp }}/toast-menus.json
        run: node .github/scripts/toast-sync.mjs

      - name: Update specials + soup + muffin from the shared payload
        env:
          TOAST_SPECIALS_GROUP: ${{ secrets.TOAST_SPECIALS_GROUP }}
          # Reuse the menu step's payload instead of calling /menus again — Toast
          # caps GET /menus at 1 req/sec per location, so a second call 429s.
          TOAST_PAYLOAD_IN: ${{ runner.temp }}/toast-menus.json
        run: node .github/scripts/specials-sync.mjs

      - name: Commit + push if anything changed
        id: commit
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git add assets/menu.json data.js assets/specials
          if git diff --cached --quiet; then
            echo "No Toast changes — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "flytrap-toast-bot"
          git config user.email "bot@theflytrapferndale.com"
          git commit -m "chore(toast): sync menu + specials [skip ci]"
          # Absorb any commit that landed on main since checkout, then push.
          git pull --rebase --autostash origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN commits don't trigger other workflows, so kick Pages
      # explicitly when something actually changed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main
