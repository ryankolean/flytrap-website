name: Specials sync

# Pulls the weekly specials from Toast (the "Weekly Specials" menu group) and
# rewrites the SPECIALS block of data.js — including downloading each special's
# photo into assets/specials/ — then commits to main so Pages redeploys. The
# standing menu is never touched. No-op until the TOAST_* secrets are set, so it
# is safe to merge before credentials are installed.
#
# The Toast credential needs the `menus:read` scope. On any Toast/network error
# the script writes nothing, so the last-good specials stay live.
#
# Required repo secrets: TOAST_CLIENT_ID, TOAST_CLIENT_SECRET, TOAST_RESTAURANT_GUID
# Optional: TOAST_HOSTNAME, TOAST_VEG_MARKER, TOAST_SPECIALS_GROUP

on:
  schedule:
    # Every hour at :05 — poll Toast for menu/specials updates. Most runs are a
    # no-op (nothing committed unless the specials actually changed). GitHub's
    # scheduler is best-effort and can lag a few minutes.
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Verify only — pull specials from Toast and log, write nothing'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: specials-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull specials from Toast
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
          TOAST_HOSTNAME: ${{ secrets.TOAST_HOSTNAME }}
          TOAST_VEG_MARKER: ${{ secrets.TOAST_VEG_MARKER }}
          TOAST_SPECIALS_GROUP: ${{ secrets.TOAST_SPECIALS_GROUP }}
          TOAST_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: node .github/scripts/specials-sync.mjs

      - name: Commit specials changes
        id: commit
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git add data.js assets/specials
          if git diff --cached --quiet; then
            echo "No specials changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "flytrap-specials-bot"
          git config user.email "bot@theflytrapferndale.com"
          git commit -m "chore(specials): sync from Toast [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN commits don't trigger other workflows, so kick Pages
      # explicitly when the specials actually changed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main
