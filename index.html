<p>Monday–Sunday, 8:00&nbsp;AM&nbsp;–&nbsp;3:00&nbsp;PM (open every day). Walk-in only, no reservations.</p>

Phone: <a href="tel:+12483995150">(248) 399-5150</a><br>

<ul>
<li>Green Eggs and Ham — poblano pesto, jack cheese, seared city ham</li>
<li>Huevos Rancheros — two eggs, black beans, jack cheese, jalapeños, pico</li>
<li>Cowboy Curtis — seared flank steak, two eggs, wildwest sauce</li>
<li>Red Chili Salmon Burger — the dish Guy Fieri featured on Diners, Drive-Ins and Dives</li>
<li>Salads, sandwiches, and a full vegetarian selection (Veggie Rumble, Tempting Tempeh, Mac Loves Cheese)</li>
</ul>
