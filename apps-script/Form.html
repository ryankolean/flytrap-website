<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 560px; margin: 24px auto; padding: 0 16px; color: #1A1A1A; }
  h1 { color: #992F1E; font-size: 22px; }
  fieldset { border: 1px solid #ddd; border-radius: 10px; margin: 16px 0; padding: 12px 16px; }
  legend { color: #992F1E; font-weight: 600; padding: 0 6px; }
  label { display: block; margin: 10px 0 4px; font-weight: 500; font-size: 14px; }
  input[type=text], textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
  textarea { min-height: 70px; }
  .row { display: flex; gap: 12px; align-items: center; }
  button { background: #992F1E; color: #fff; border: 0; border-radius: 8px; padding: 12px 20px; font: inherit; font-weight: 600; cursor: pointer; }
  button.secondary { background: #fff; color: #992F1E; border: 1px solid #992F1E; }
  button.remove { background: #fff; color: #b3261e; border: 1px solid #ddd; padding: 6px 10px; font-size: 13px; }
  button:disabled { opacity: .5; cursor: default; }
  .thumb { width: 88px; height: 88px; object-fit: cover; border-radius: 8px; background: #eee; }
  #status, #status2 { margin: 12px 0; min-height: 22px; }
  .err { color: #b3261e; } .ok { color: #1a7f37; }
  .muted { color: #666; font-size: 14px; }
  .card { border: 1px solid #eee; border-radius: 10px; padding: 12px; margin: 8px 0; }
  .card img { width: 100%; border-radius: 8px; }
  .hidden { display: none; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0 16px; }
</style>
</head>
<body>
<h1>Submit this week's specials</h1>

<div id="formView">
  <label>Passcode</label>
  <input type="text" id="passcode" autocomplete="off">
  <label>Week of (shown on the site)</label>
  <input type="text" id="weekOf" placeholder="June 23">

  <div id="specialsList"></div>

  <div class="toolbar">
    <button type="button" id="addBtn" class="secondary">+ Add another special</button>
  </div>
  <p class="muted" id="countNote"></p>

  <button id="previewBtn">Preview &rarr;</button>
  <div id="status"></div>
</div>

<div id="previewView" class="hidden">
  <h1>Looks right?</h1>
  <div id="cards"></div>
  <button id="publishBtn">Publish to website</button>
  <button id="backBtn" class="secondary">Back</button>
  <div id="status2"></div>
</div>

<template id="specialTpl">
  <fieldset class="special">
    <legend></legend>
    <label>Name</label><input type="text" class="s-name">
    <label>Description</label><textarea class="s-desc"></textarea>
    <label>Price (optional)</label><input type="text" class="s-price" placeholder="14.95">
    <div class="row"><label><input type="checkbox" class="s-veg"> Vegetarian</label></div>
    <label>Photo</label>
    <div class="row"><input type="file" class="s-photo" accept="image/*"><img class="thumb"></div>
    <div class="row" style="margin-top:10px"><button type="button" class="remove">Remove this special</button></div>
  </fieldset>
</template>

<script>
  var list = document.getElementById('specialsList');
  var tpl = document.getElementById('specialTpl');

  function renumber() {
    var cards = list.querySelectorAll('fieldset.special');
    cards.forEach(function (c, i) { c.querySelector('legend').textContent = 'Special ' + (i + 1); });
    document.getElementById('countNote').textContent = cards.length === 0
      ? 'No specials — the website section will say there are none this week.'
      : cards.length + (cards.length === 1 ? ' special' : ' specials') + ' will be published.';
  }

  function addSpecial() {
    var node = tpl.content.firstElementChild.cloneNode(true);
    node._photo = null;
    node.querySelector('.s-photo').addEventListener('change', function (e) {
      var f = e.target.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var S = 1080, c = document.createElement('canvas'); c.width = S; c.height = S;
          var side = Math.min(img.width, img.height);
          var sx = (img.width - side) / 2, sy = (img.height - side) / 2;
          c.getContext('2d').drawImage(img, sx, sy, side, side, 0, 0, S, S);
          node._photo = c.toDataURL('image/jpeg', 0.85);
          node.querySelector('.thumb').src = node._photo;
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(f);
    });
    node.querySelector('.remove').addEventListener('click', function () { node.remove(); renumber(); });
    list.appendChild(node);
    renumber();
  }

  document.getElementById('addBtn').addEventListener('click', addSpecial);
  addSpecial(); addSpecial();

  function setStatus(id, msg, cls) { var e = document.getElementById(id); e.textContent = msg || ''; e.className = cls || ''; }

  function collect() {
    var cards = list.querySelectorAll('fieldset.special');
    var specials = [];
    cards.forEach(function (c) {
      specials.push({
        name: c.querySelector('.s-name').value.trim(),
        desc: c.querySelector('.s-desc').value.trim(),
        price: c.querySelector('.s-price').value.trim().replace(/^\$+/, '').trim(),
        veg: c.querySelector('.s-veg').checked,
        imageDataUrl: c._photo,
      });
    });
    return {
      passcode: document.getElementById('passcode').value,
      weekOf: 'Week of ' + document.getElementById('weekOf').value.trim(),
      specials: specials,
    };
  }

  function escapeHtml(s) { return s.replace(/[&<>"]/g, function (ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch]; }); }

  document.getElementById('previewBtn').onclick = function () {
    var p = collect();
    for (var i = 0; i < p.specials.length; i++) {
      var s = p.specials[i];
      if (!s.name || !s.desc || !s.imageDataUrl) {
        return setStatus('status', 'Special ' + (i + 1) + ' needs a name, description, and photo.', 'err');
      }
    }
    var html = p.specials.length
      ? p.specials.map(function (s) {
          return '<div class="card"><img src="' + s.imageDataUrl + '"><h3>' + escapeHtml(s.name) +
            (s.veg ? ' (veg)' : '') + '</h3><p>' + escapeHtml(s.desc) + '</p>' +
            (s.price ? '<p>$' + escapeHtml(s.price) + '</p>' : '') + '</div>';
        }).join('')
      : '<p class="muted">No specials — the website section will say there are none this week.</p>';
    document.getElementById('cards').innerHTML = html;
    document.getElementById('formView').className = 'hidden';
    document.getElementById('previewView').className = '';
  };

  document.getElementById('backBtn').onclick = function () {
    document.getElementById('previewView').className = 'hidden';
    document.getElementById('formView').className = '';
  };

  document.getElementById('publishBtn').onclick = function () {
    var btn = this; btn.disabled = true;
    setStatus('status2', 'Publishing…', '');
    google.script.run
      .withSuccessHandler(function (r) { setStatus('status2', 'Published ' + r.weekOf + ' — live in about a minute.', 'ok'); })
      .withFailureHandler(function (e) { btn.disabled = false; setStatus('status2', e.message, 'err'); })
      .publishSpecials(collect());
  };
</script>
</body>
</html>
